<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Apps - Privacy Policies</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #1a1a1a;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      margin-bottom: 10px;
    }

    p.subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.12);
    }

    .app-name {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .desc {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .footer {
      text-align: center;
      margin-top: 50px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Apps</h1>
    <p class="subtitle">Privacy Policies & App Information</p>

    <div class="grid">

      <div class="card">
        <div class="app-name">BaZi Fortune</div>
        <div class="desc">Daily BaZi insights and personal destiny analysis.</div>
        <a class="btn" href="bazi-daily.html">View Privacy Policy</a>
      </div>



      <!-- Add more apps below -->

    </div>

    <div class="footer">
      © 2026 Your Apps. All rights reserved.
    </div>
  </div>
</body>
</html>
